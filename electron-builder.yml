appId: com.cowork.desktop
productName: Cowork
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!out/**/*.map"
extraResources:
  - from: resources/
    to: resources/
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
